name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Image
        run: |
          docker build -t ghcr.io/${{ secrets.GHCR_USERNAME }}/pixel-peek-server:latest .

      - name: Push Image
        run: |
          docker push ghcr.io/${{ secrets.GHCR_USERNAME }}/pixel-peek-server:latest

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd ~/PixelPeek/server
            docker compose pull
            docker compose up -d
            docker image prune -f
